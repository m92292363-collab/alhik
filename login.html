<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al Hikma University - Student Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 50px 40px;
      border-radius: 15px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 35px; }
    .logo h1 { color: #1a3a5c; font-size: 1.5rem; }
    .logo p { color: #c9a84c; font-size: 0.9rem; margin-top: 5px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #555; font-size: 0.9rem; margin-bottom: 7px; font-weight: 600; }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
      outline: none;
    }
    .form-group input:focus { border-color: #1a3a5c; }
    .btn-login {
      width: 100%;
      background: #1a3a5c;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .btn-login:hover { background: #c9a84c; }
    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 15px;
      display: none;
    }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #1a3a5c; text-decoration: none; font-size: 0.9rem; }
    .back-link a:hover { color: #c9a84c; }
  </style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <h1>🎓 Al Hikma University</h1>
    <p>Student Portal — جامعة الحكمة</p>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label>Student ID</label>
    <input type="text" id="studentId" placeholder="e.g. STU-2024-001" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" />
  </div>
  <button class="btn-login" onclick="handleLogin()">Login to Portal</button>
  <div class="back-link"><a href="index.html">← Back to Homepage</a></div>
</div>

<script>
async function handleLogin() {
  const studentId = document.getElementById('studentId').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.style.display = 'none';

  if (!studentId || !password) {
    errorMsg.textContent = 'Please enter your Student ID and password.';
    errorMsg.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('/.netlify/functions/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier: studentId, password, role: 'student' })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('userRole', 'student');
      window.location.href = 'student-dashboard.html';
    } else {
      errorMsg.textContent = data.error || 'Invalid credentials. Please try again.';
      errorMsg.style.display = 'block';
    }
  } catch (e) {
    errorMsg.textContent = 'Connection error. Please try again.';
    errorMsg.style.display = 'block';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
